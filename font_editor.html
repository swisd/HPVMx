<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rust Extended ASCII Font Editor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #cfcfcf; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-layout { display: flex; gap: 25px; max-width: 1100px; width: 100%; justify-content: center; }

        /* Drawing Grid */
        .editor-card { background: #252526; padding: 20px; border-radius: 8px; border: 1px solid #444; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #canvas-grid { display: grid; grid-template-columns: repeat(8, 24px); grid-template-rows: repeat(16, 24px); border: 2px solid #333; background: #000; cursor: pointer; }
        .pixel { width: 24px; height: 24px; border: 1px solid #1e1e1e; }
        .pixel.on { background-color: #00ff95; box-shadow: inset 0 0 8px rgba(0,0,0,0.5); }

        /* Controls */
        .button-group { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        button { background: #3e3e42; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        button:hover { background: #4e4e52; }
        button.accent { background: #007acc; border-color: #005a9e; }
        select { background: #3e3e42; color: white; padding: 8px; border-radius: 4px; width: 100%; border: 1px solid #555; }

        /* Preview & Output */
        .side-panel { display: flex; flex-direction: column; gap: 20px; flex-grow: 1; }
        #preview-canvas { background: #000; border: 1px solid #444; height: 80px; width: 100%; image-rendering: pixelated; }
        textarea { width: 100%; height: 350px; background: #1e1e1e; color: #d7ba7d; font-family: 'Consolas', monospace; font-size: 12px; padding: 10px; border: 1px solid #444; border-radius: 4px; }
        h3 { margin-top: 0; color: #9cdcfe; font-weight: normal; border-bottom: 1px solid #444; padding-bottom: 8px; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="editor-card">
        <h3 id="char-label">Editing: [32] Space</h3>
        <div id="canvas-grid"></div>

        <div class="button-group">
            <select id="char-selector"></select>
        </div>

        <div class="button-group">
            <button onclick="shift('up')">↑</button>
            <button onclick="shift('down')">↓</button>
            <button onclick="shift('left')">←</button>
            <button onclick="shift('right')">→</button>
            <button onclick="clearGrid()">Clear</button>
        </div>

        <div class="button-group" style="margin-top:20px; border-top: 1px solid #444; padding-top: 15px;">
            <button class="accent" onclick="copyBuffer()">Copy Glyph</button>
            <button class="accent" onclick="pasteBuffer()">Paste Glyph</button>
        </div>
    </div>

    <div class="side-panel">
        <div class="editor-card">
            <h3>Live Preview (Scale 2x)</h3>
            <canvas id="preview-canvas" width="400" height="80"></canvas>
            <input type="text" id="preview-text" value="Testing 0123! ñá" style="width:100%; margin-top:10px; background:#1e1e1e; color:#00ff95; border:1px solid #444; padding:8px;">
        </div>

        <div class="editor-card" style="flex-grow: 1;">
            <h3>Rust Code [u8; 16]; 256</h3>
            <textarea id="output-code" spellcheck="false"></textarea>
            <button onclick="importCode()" style="width:100%; margin-top:10px;">Import Existing Code</button>
        </div>
    </div>
</div>

<script>
    const grid = document.getElementById('canvas-grid');
    const selector = document.getElementById('char-selector');
    const output = document.getElementById('output-code');
    const previewText = document.getElementById('preview-text');
    const previewCanvas = document.getElementById('preview-canvas');
    const ctx = previewCanvas.getContext('2d');

    // Array for 0-255
    let fontData = Array.from({ length: 256 }, () => Array(16).fill(0));
    let clipboard = null;

    // Build Selector 0-255
    for (let i = 0; i < 256; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        // Show char if printable, otherwise show hex code
        let label = (i > 32 && i < 127) || (i > 160) ? String.fromCharCode(i) : `0x${i.toString(16).toUpperCase()}`;
        opt.textContent = `${i}: ${label}`;
        selector.appendChild(opt);
    }
    selector.value = 32;

    function initGrid() {
        grid.innerHTML = '';
        for (let r = 0; r < 16; r++) {
            for (let c = 0; c < 8; c++) {
                const d = document.createElement('div');
                d.className = 'pixel';
                d.onclick = () => togglePixel(r, c);
                grid.appendChild(d);
            }
        }
        updateUI();
    }

    function togglePixel(r, c) {
        fontData[selector.value][r] ^= (1 << (7 - c));
        updateUI();
    }

    function updateUI() {
        const idx = selector.value;
        const data = fontData[idx];
        const pixels = document.querySelectorAll('.pixel');
        data.forEach((byte, r) => {
            for (let c = 0; c < 8; c++) {
                const isOn = (byte >> (7 - c)) & 1;
                pixels[(r * 8) + c].className = isOn ? 'pixel on' : 'pixel';
            }
        });
        document.getElementById('char-label').textContent = `Editing: [${idx}] ${selector.options[selector.selectedIndex].text.split(': ')[1]}`;
        generateCode();
        renderPreview();
    }

    function shift(dir) {
        let char = fontData[selector.value];
        if (dir === 'up') { char.shift(); char.push(0); }
        else if (dir === 'down') { char.unshift(0); char.pop(); }
        else if (dir === 'left') fontData[selector.value] = char.map(b => (b << 1) & 0xFF);
        else if (dir === 'right') fontData[selector.value] = char.map(b => (b >> 1));
        updateUI();
    }

    function copyBuffer() { clipboard = JSON.parse(JSON.stringify(fontData[selector.value])); }
    function pasteBuffer() { if(clipboard) { fontData[selector.value] = [...clipboard]; updateUI(); } }
    function clearGrid() { fontData[selector.value].fill(0); updateUI(); }

    function renderPreview() {
        const str = previewText.value;
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
        ctx.fillStyle = "#00ff95";

        for (let i = 0; i < str.length; i++) {
            const code = str.charCodeAt(i);
            if (code > 255) continue;
            const data = fontData[code];
            const xOff = i * 9;
            data.forEach((byte, y) => {
                for (let x = 0; x < 8; x++) {
                    if ((byte >> (7 - x)) & 1) ctx.fillRect((xOff + x) * 2, (y + 12) * 2, 2, 2);
                }
            });
        }
    }

    function generateCode() {
        let res = "const BASIC_FONT: [[u8; 16]; 256] = {\n    let mut font = [[0u8; 16]; 256];\n\n";
        for (let i = 0; i < 256; i++) {
            if (fontData[i].some(b => b !== 0)) {
                const bytes = fontData[i].map(b => '0x' + b.toString(16).toUpperCase().padStart(2, '0')).join(', ');
                let comment = (i > 32 && i < 127) || (i > 160) ? String.fromCharCode(i) : `Idx ${i}`;
                res += `    font[${i}] = [${bytes}]; // ${comment}\n`;
            }
        }
        res += "\n    font\n};";
        output.value = res;
    }

    function importCode() {
        const text = output.value;
        const regex = /font\[(\d+)\]\s*=\s*\[([^\]]+)\]/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
            const idx = parseInt(match[1]);
            if (idx < 256) {
                fontData[idx] = match[2].split(',').map(s => parseInt(s.trim(), 16));
            }
        }
        updateUI();
    }

    selector.onchange = updateUI;
    previewText.oninput = renderPreview;
    initGrid();
</script>
</body>
</html>
