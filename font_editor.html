<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rust Bitmap Font Editor Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; margin: 0; }
        .main-layout { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }

        /* Editor Section */
        .editor-card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #canvas-grid { display: grid; grid-template-columns: repeat(8, 25px); grid-template-rows: repeat(16, 25px); border: 2px solid #444; background: #000; cursor: crosshair; }
        .pixel { width: 25px; height: 25px; border: 1px solid #222; box-sizing: border-box; }
        .pixel.on { background-color: #4ec9b0; box-shadow: inset 0 0 5px #000; }
        .pixel.off:hover { background-color: #333; }

        /* Controls */
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .button-group { display: flex; gap: 5px; flex-wrap: wrap; }
        button { background: #3c3c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        button:hover { background: #505050; }
        button.primary { background: #007acc; }
        select { background: #3c3c3c; color: white; padding: 8px; border-radius: 4px; border: 1px solid #555; }

        /* Preview Section */
        .preview-card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; min-width: 300px; }
        #preview-canvas { background: #000; border: 1px solid #444; image-rendering: pixelated; width: 100%; height: auto; }
        #preview-input { width: 100%; padding: 10px; background: #121212; color: #4ec9b0; border: 1px solid #444; margin-top: 10px; box-sizing: border-box; }

        /* Code Output */
        .code-section { width: 100%; max-width: 900px; margin-top: 20px; }
        textarea { width: 100%; height: 250px; background: #000; color: #ce9178; border: 1px solid #333; font-family: 'Consolas', monospace; padding: 10px; border-radius: 4px; }

        h3 { margin-top: 0; color: #569cd6; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="editor-card">
        <h3>Editor</h3>
        <div id="canvas-grid"></div>
        <div class="controls">
            <select id="char-selector"></select>
            <div class="button-group">
                <button onclick="shift('up')">↑ Up</button>
                <button onclick="shift('down')">↓ Down</button>
                <button onclick="shift('left')">← Left</button>
                <button onclick="shift('right')">→ Right</button>
            </div>
            <div class="button-group">
                <button onclick="clearGrid()" style="background: #a31515;">Clear</button>
                <button class="primary" onclick="importFromCode()">Import From Code</button>
            </div>
        </div>
    </div>

    <div class="preview-card">
        <h3>Live Preview</h3>
        <canvas id="preview-canvas" width="256" height="64"></canvas>
        <input type="text" id="preview-input" value="Hello World! 123" placeholder="Type here to preview...">
        <p style="font-size: 11px; color: #888;">Rendered at 2x scale</p>
    </div>

    <div class="code-section">
        <h3>Rust Output</h3>
        <textarea id="output-code" spellcheck="false"></textarea>
    </div>
</div>

<script>
    const grid = document.getElementById('canvas-grid');
    const selector = document.getElementById('char-selector');
    const output = document.getElementById('output-code');
    const previewInput = document.getElementById('preview-input');
    const previewCanvas = document.getElementById('preview-canvas');
    const ctx = previewCanvas.getContext('2d');

    let fontData = Array.from({ length: 128 }, () => Array(16).fill(0));

    // Setup Selector
    for (let i = 32; i < 127; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `Char ${i} (${String.fromCharCode(i)})`;
        selector.appendChild(opt);
    }

    // Setup Grid UI
    function initGrid() {
        grid.innerHTML = '';
        for (let r = 0; r < 16; r++) {
            for (let c = 0; c < 8; c++) {
                const d = document.createElement('div');
                d.className = 'pixel off';
                d.onclick = () => {
                    fontData[selector.value][r] ^= (1 << (7 - c));
                    updateAll();
                };
                grid.appendChild(d);
            }
        }
    }

    function updateAll() {
        renderGrid();
        generateCode();
        drawPreview();
    }

    function renderGrid() {
        const charIdx = selector.value;
        const pixels = document.querySelectorAll('.pixel');
        fontData[charIdx].forEach((byte, r) => {
            for (let c = 0; c < 8; c++) {
                const isOn = (byte >> (7 - c)) & 1;
                pixels[(r * 8) + c].className = isOn ? 'pixel on' : 'pixel off';
            }
        });
    }

    // Directional Shifting Logic
    function shift(dir) {
        const idx = selector.value;
        let char = fontData[idx];

        if (dir === 'up') {
            char.shift();
            char.push(0);
        } else if (dir === 'down') {
            char.unshift(0);
            char.pop();
        } else if (dir === 'left') {
            fontData[idx] = char.map(byte => (byte << 1) & 0xFF);
        } else if (dir === 'right') {
            fontData[idx] = char.map(byte => (byte >> 1));
        }
        updateAll();
    }

    function drawPreview() {
        const text = previewInput.value;
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
        ctx.fillStyle = "#4ec9b0";

        for (let i = 0; i < text.length; i++) {
            const code = text.charCodeAt(i);
            if (code >= 128) continue;
            const charData = fontData[code];
            const xOffset = i * 9; // 8 pixels + 1 space

            charData.forEach((byte, y) => {
                for (let x = 0; x < 8; x++) {
                    if ((byte >> (7 - x)) & 1) {
                        ctx.fillRect((xOffset + x) * 2, (y + 10) * 2, 2, 2);
                    }
                }
            });
        }
    }

    function generateCode() {
        let code = "const BASIC_FONT: [[u8; 16]; 128] = {\n    let mut font = [[0u8; 16]; 128];\n\n";
        for (let i = 32; i < 127; i++) {
            if (fontData[i].some(b => b !== 0)) {
                const bytes = fontData[i].map(b => '0x' + b.toString(16).toUpperCase().padStart(2, '0')).join(', ');
                code += `    font[${i}] = [${bytes}]; // ${String.fromCharCode(i)}\n`;
            }
        }
        code += "\n    font\n};";
        output.value = code;
    }

    function importFromCode() {
        const text = output.value;
        const regex = /font\[(\d+)\]\s*=\s*\[([^\]]+)\]/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
            const idx = parseInt(match[1]);
            const bytes = match[2].split(',').map(s => parseInt(s.trim(), 16));
            if (idx < 128) fontData[idx] = bytes;
        }
        updateAll();
    }

    function clearGrid() {
        fontData[selector.value].fill(0);
        updateAll();
    }

    selector.onchange = renderGrid;
    previewInput.oninput = drawPreview;

    initGrid();
    generateCode();
</script>
</body>
</html>
