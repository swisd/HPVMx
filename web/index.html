<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPVMx UEFI Sandbox</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #58a6ff;
        }
        #screen_container {
            border: 4px solid #30363d;
            border-radius: 6px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #screen_container canvas {
            display: block;
        }
        .status-panel {
            margin-top: 20px;
            font-size: 14px;
            color: #8b949e;
            background: #161b22;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <h1>HPVMx UEFI Web Sandbox</h1>
    
    <div id="screen_container">
        <canvas style="display: none;"></canvas>
    </div>
    
    <div class="status-panel" id="status">Initializing UEFI Environment...</div>

    <script src="https://copy.sh/v86/build/libv86.js"></script>
    <script>
        window.onload = function() {
            const statusEl = document.getElementById("status");

            // Configuring v86 for UEFI execution
            const emulator = new V86Starter({
                wasm_path: "https://copy.sh/v86/build/v86.wasm",
                
                // 1. UEFI OVMF firmware images usually require at least 64MB-128MB to execute
                memory_size: 128 * 1024 * 1024, 
                vga_memory_size: 8 * 1024 * 1024,
                
                // 2. Hardware configurations vital for UEFI-aware firmware
                vga_as_pci: true,
                acpi: true, 

                // 3. Mount bios.bin (code.fd + vars.fd) as initial ROM payload
                bios: {
                    url: "bios.bin"
                },
                
                // 4. Bind usb.img as the primary IDE Hard Disk
                hda: {
                    url: "usb.img"
                },

                // 5. Force the emulator to prioritize the custom BIOS binary structure over legacy floppies
                boot_order: 0x213, // Standard code for CD/BIOS/Hard-Disk priority layout

                screen_container: document.getElementById("screen_container"),
                autostart: true
            });

            emulator.add_listener("emulator-ready", function() {
                statusEl.innerText = "Status: Running (Click viewport to interact)";
                statusEl.style.color = "#7ee787";
            });
        };
    </script>
</body>
</html>
