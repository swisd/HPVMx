<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPVMx Mobile Sandbox</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #58a6ff;
            text-align: center;
        }
        #screen_container {
            border: 3px solid #30363d;
            border-radius: 6px;
            background: #000;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
        }
        /* Fixed visibility parameters to prevent Safari canvas allocation dropouts */
        #screen_container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }
        .status-panel {
            margin-top: 12px;
            font-size: 13px;
            color: #8b949e;
            background: #161b22;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #30363d;
            margin-bottom: 15px;
        }
        .devtools-container {
            width: 100%;
            max-width: 640px;
            margin-top: 10px;
        }
        .devtools-header {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-bottom: none;
            padding: 6px 12px;
            font-size: 12px;
            color: #8b949e;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            font-family: monospace;
        }
        #devtools_terminal {
            width: 100%;
            height: 250px;
            background-color: #010409;
            border: 1px solid #30363d;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-line { border-bottom: 1px solid #21262d; padding: 3px 0; }
        .log-info { color: #c9d1d9; }
        .log-debug { color: #58a6ff; }
        .log-warn { color: #d29922; background: rgba(187, 128, 9, 0.1); }
        .log-error { color: #f85149; background: rgba(248, 81, 73, 0.1); }
        
        #mobile_keyboard_trigger {
            position: absolute;
            left: -9999px;
            opacity: 0;
        }
    </style>
    <script>
        // High-fidelity early interceptor pipeline
        (function() {
            const originalLog = console.log;
            const originalWarn = console.warn;
            const originalError = console.error;
            const logQueue = [];

            window.__appendLogToTerminal = function(args, type) {
                const term = document.getElementById('devtools_terminal');
                const message = Array.from(args).map(arg => {
                    if (arg instanceof Error) return `${arg.name}: ${arg.message}\n${arg.stack}`;
                    if (typeof arg === 'object') {
                        try { return JSON.stringify(arg); } catch(e) { return String(arg); }
                    }
                    return String(arg);
                }).join(' ');

                const timestamp = new Date().toISOString().split('T')[1].slice(0, -1);

                if (term) {
                    const line = document.createElement('div');
                    line.className = `log-line log-${type}`;
                    line.textContent = `[${timestamp}] [${type.toUpperCase()}] ${message}`;
                    term.appendChild(line);
                    term.scrollTop = term.scrollHeight;
                } else {
                    logQueue.push({ args, type, timestamp });
                }
            };

            console.log = function() { originalLog.apply(console, arguments); window.__appendLogToTerminal(arguments, 'info'); };
            console.warn = function() { originalWarn.apply(console, arguments); window.__appendLogToTerminal(arguments, 'warn'); };
            console.error = function() { originalError.apply(console, arguments); window.__appendLogToTerminal(arguments, 'error'); };
            console.debug = function() { window.__appendLogToTerminal(arguments, 'debug'); };
            
            window.addEventListener('error', function(e) {
                window.__appendLogToTerminal([e.message, `at ${e.filename}:${e.lineno}`], 'error');
            });

            window.addEventListener('DOMContentLoaded', () => {
                const term = document.getElementById('devtools_terminal');
                while(logQueue.length > 0) {
                    const item = logQueue.shift();
                    const line = document.createElement('div');
                    line.className = `log-line log-${item.type}`;
                    line.textContent = `[${item.timestamp}] [${item.type.toUpperCase()}] ${Array.from(item.args).join(' ')}`;
                    term.appendChild(line);
                }
                term.scrollTop = term.scrollHeight;
            });
        })();
    </script>

    <script src="https://unpkg.com/v86@0.5.44/build/libv86.js"></script>
</head>
<body>

    <h1>HPVMx Mobile Sandbox</h1>
    
    <div id="screen_container" onclick="focusKeyboard()">
        <canvas></canvas>
    </div>
    
    <input type="text" id="mobile_keyboard_trigger" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <div class="status-panel" id="status">Booting UEFI Machine...</div>

    <div class="devtools-container">
        <div class="devtools-header">Mirrored Browser DevTools Console</div>
        <div id="devtools_terminal"></div>
    </div>

    <script>
        console.debug("Verifying environments...");
        console.debug("WebAssembly support:", typeof WebAssembly === "object" ? "OK" : "MISSING");

        async function verifyAsset(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                console.debug(`Verified asset dependency ${url}: status=${response.status}`);
            } catch (err) {
                console.warn(`Pre-flight probe failed for ${url}`, err);
            }
        }

        verifyAsset("bios.bin");
        verifyAsset("usb.img");

        window.addEventListener('load', () => {
            console.log("Window fully loaded. Testing constructor visibility...");
            if (typeof V86Starter !== 'undefined') {
                initEmulator(V86Starter);
            } else if (typeof window.v86 !== 'undefined' && typeof window.v86.V86Starter !== 'undefined') {
                initEmulator(window.v86.V86Starter);
            } else {
                console.error("CRITICAL: v86 scripts loaded but compilation namespace could not be located.");
            }
        });

        function focusKeyboard() {
            document.getElementById("mobile_keyboard_trigger").focus();
        }

        function initEmulator(ConstructorInstance) {
            const statusEl = document.getElementById("status");
            console.log("Triggering engine boot parameters...");

            try {
                const emulator = new ConstructorInstance({
                    wasm_path: "https://unpkg.com/v86@0.5.44/build/v86.wasm",
                    
                    // Allocated 64MB memory allocation ceiling for iOS stability
                    memory_size: 64 * 1024 * 1024, 
                    vga_memory_size: 8 * 1024 * 1024,
                    vga_as_pci: true,
                    acpi: true, 
                    
                    vgabios: {
                        url: "https://unpkg.com/v86@0.5.44/bios/vgabios.bin"
                    },
                    bios: { url: "bios.bin" },
                    hda: { url: "usb.img" },
                    boot_order: 0x213,
                    screen_container: document.getElementById("screen_container"),
                    autostart: true
                });

                console.log("V86Starter instance object deployed to core worker layer.");

                const inputTrigger = document.getElementById("mobile_keyboard_trigger");
                inputTrigger.addEventListener("input", function(e) {
                    const char = e.target.value.slice(-1);
                    if (char) emulator.serial0_send(char);
                    e.target.value = "";
                });

                inputTrigger.addEventListener("keydown", function(e) {
                    if (e.key === "Enter") emulator.serial0_send("\r\n");
                    else if (e.key === "Backspace") emulator.serial0_send("\b");
                });

                emulator.add_listener("emulator-ready", function() {
                    statusEl.innerText = "Status: Live. Tap display to type.";
                    statusEl.style.color = "#7ee787";
                    console.log("SUCCESS: Virtual system engine execution cycle online.");
                });

            } catch (e) {
                statusEl.innerText = "Runtime Engine Exception Catch";
                statusEl.style.color = "#ff7b72";
                console.error("Initialization loop broke down during construction:", e);
            }
        }
    </script>
</body>
</html>
