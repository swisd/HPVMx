<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPVMx Sandbox</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #58a6ff;
            text-align: center;
        }
        #screen_container {
            border: 3px solid #30363d;
            border-radius: 6px;
            background: #000;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
        }
        #screen_container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        .status-panel {
            margin-top: 12px;
            font-size: 13px;
            color: #8b949e;
            background: #161b22;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #30363d;
            margin-bottom: 15px;
        }
        .devtools-container {
            width: 100%;
            max-width: 640px;
            margin-top: 10px;
        }
        .devtools-header {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-bottom: none;
            padding: 6px 12px;
            font-size: 12px;
            color: #8b949e;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            font-family: monospace;
        }
        #devtools_terminal {
            width: 100%;
            height: 250px;
            background-color: #010409;
            border: 1px solid #30363d;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-line { border-bottom: 1px solid #21262d; padding: 3px 0; }
        .log-info { color: #c9d1d9; }
        .log-warn { color: #d29922; background: rgba(187, 128, 9, 0.1); }
        .log-error { color: #f85149; background: rgba(248, 81, 73, 0.1); }
        
        #mobile_keyboard_trigger {
            position: absolute;
            left: -9999px;
            opacity: 0;
        }
    </style>
    <script>
        // Start intercepting console immediately so we can catch script errors early
        (function() {
            const originalLog = console.log;
            const originalWarn = console.warn;
            const originalError = console.error;
            const logQueue = [];

            window.__appendLogToTerminal = function(args, type) {
                const term = document.getElementById('devtools_terminal');
                const message = Array.from(args).map(arg => {
                    if (typeof arg === 'object') {
                        try { return JSON.stringify(arg); } catch(e) { return String(arg); }
                    }
                    return String(arg);
                }).join(' ');

                if (term) {
                    const line = document.createElement('div');
                    line.className = `log-line log-${type}`;
                    line.textContent = `[${type.toUpperCase()}] ${message}`;
                    term.appendChild(line);
                    term.scrollTop = term.scrollHeight;
                } else {
                    logQueue.push({ args, type });
                }
            };

            console.log = function() { originalLog.apply(console, arguments); window.__appendLogToTerminal(arguments, 'info'); };
            console.warn = function() { originalWarn.apply(console, arguments); window.__appendLogToTerminal(arguments, 'warn'); };
            console.error = function() { originalError.apply(console, arguments); window.__appendLogToTerminal(arguments, 'error'); };
            
            window.addEventListener('error', function(e) {
                window.__appendLogToTerminal([e.message, `at ${e.filename}:${e.lineno}`], 'error');
            });

            window.addEventListener('DOMContentLoaded', () => {
                // Flush early logs to the terminal box once it renders
                while(logQueue.length > 0) {
                    const item = logQueue.shift();
                    window.__appendLogToTerminal(item.args, item.type);
                }
            });
        })();
    </script>
</head>
<body>

    <h1>HPVMx Sandbox</h1>
    
    <div id="screen_container" onclick="focusKeyboard()">
        <canvas style="display: none;"></canvas>
    </div>
    
    <input type="text" id="mobile_keyboard_trigger" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <div class="status-panel" id="status">Loading Framework...</div>

    <div class="devtools-container">
        <div class="devtools-header">Mirrored Browser DevTools Console</div>
        <div id="devtools_terminal"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/v86@0.5.44/build/libv86.js" id="v86-script"></script>
    
    <script>
        // Check manually to see if script loaded or attach listener
        const scriptTag = document.getElementById('v86-script');
        if (typeof V86Starter !== 'undefined') {
            initEmulator();
        } else {
            scriptTag.addEventListener('load', initEmulator);
            scriptTag.addEventListener('error', () => {
                console.error("The v86 engine script failed to download from the CDN.");
            });
        }

        function focusKeyboard() {
            document.getElementById("mobile_keyboard_trigger").focus();
        }

        function initEmulator() {
            const statusEl = document.getElementById("status");
            statusEl.innerText = "Booting UEFI Runtime...";
            console.log("Starting emulator setup...");

            try {
                const emulator = new V86Starter({
                    // Align the WebAssembly engine path to match the stable jsDelivr layer
                    wasm_path: "https://cdn.jsdelivr.net/npm/v86@0.5.44/build/v86.wasm",
                    memory_size: 128 * 1024 * 1024, 
                    vga_memory_size: 8 * 1024 * 1024,
                    vga_as_pci: true,
                    acpi: true, 
                    bios: { url: "bios.bin" },
                    hda: { url: "usb.img" },
                    boot_order: 0x213,
                    screen_container: document.getElementById("screen_container"),
                    autostart: true
                });

                const inputTrigger = document.getElementById("mobile_keyboard_trigger");
                inputTrigger.addEventListener("input", function(e) {
                    const char = e.target.value.slice(-1);
                    if (char) emulator.serial0_send(char);
                    e.target.value = "";
                });

                inputTrigger.addEventListener("keydown", function(e) {
                    if (e.key === "Enter") emulator.serial0_send("\r\n");
                    else if (e.key === "Backspace") emulator.serial0_send("\b");
                });

                emulator.add_listener("emulator-ready", function() {
                    statusEl.innerText = "Status: Live. Tap display to type.";
                    statusEl.style.color = "#7ee787";
                    console.log("v86 backend reports: Emulator system ready.");
                });

            } catch (e) {
                statusEl.innerText = "Initialization Error";
                statusEl.style.color = "#ff7b72";
                console.error("Failed to boot v86 initialization wrapper:", e);
            }
        }
    </script>
</body>
</html>
