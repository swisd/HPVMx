<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPVMx x64 VGA Hardware Sandbox</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            color: #58a6ff;
            margin-bottom: 12px;
        }
        .status-panel {
            font-size: 13px;
            color: #8b949e;
            background: #161b22;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #30363d;
            margin-bottom: 15px;
        }
        #display_wrapper {
            border: 3px solid #30363d;
            border-radius: 6px;
            background: #000;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            position: relative;
        }
        #vga_canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #monitor_log {
            width: 100%;
            max-width: 640px;
            height: 150px;
            background-color: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px;
            margin-top: 15px;
            box-sizing: border-box;
            overflow-y: auto;
            font-size: 12px;
            color: #8b949e;
            white-space: pre-wrap;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qemu-wasm@latest/dist/qemu-wasm.js"></script>
</head>
<body>

    <h1>HPVMx x64 VGA Hardware Sandbox</h1>
    <div class="status-panel" id="boot_status">Loading hardware emulation modules...</div>

    <div id="display_wrapper">
        <canvas id="vga_canvas"></canvas>
    </div>

    <div id="monitor_log">System Monitor Logging Stream Initialization...</div>

    <script type="module">
        const statusEl = document.getElementById("boot_status");
        const logEl = document.getElementById("monitor_log");
        const canvas = document.getElementById("vga_canvas");

        function log(msg) {
            logEl.textContent += `\n[MONITOR] ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function launchVGAEngine() {
            try {
                log("Verifying deployment runtime environments...");
                
                // Fetch binary chunks into client array variables
                const biosRes = await fetch("bios.bin");
                const usbRes = await fetch("usb.img");

                if (!biosRes.ok || !usbRes.ok) {
                    throw new Error("Missing binary files. Verify bios.bin and usb.img locations.");
                }

                const biosBuffer = await biosRes.arrayBuffer();
                const usbBuffer = await usbRes.arrayBuffer();

                log("Hardware elements downloaded. Initializing QEMU CPU state...");
                statusEl.innerText = "Status: Provisioning x86_64 Core Subsystem...";

                // Initialize a 64-bit hardware engine target containing full VGA registers
                const qemu = new QEMUInstance({
                    canvas: canvas,
                    memory: "256M", // Allocate stable boundaries for modern EDK2 UEFI allocations
                    arch: "x86_64",
                    arguments: [
                        "-bios", "bios.bin",
                        "-hda", "usb.img",
                        "-vga", "std", // Enforces standard fallback graphic controller behaviors
                        "-boot", "c"   // Boot direct from storage drive image clusters
                    ],
                    files: [
                        { name: "bios.bin", data: new Uint8Array(biosBuffer) },
                        { name: "usb.img", data: new Uint8Array(usbBuffer) }
                    ]
                });

                statusEl.innerText = "Status: Machine Live (Display Listening)";
                log("Executing instruction stack. Mapping graphic pipeline frames directly to DOM canvas element.");

                // Launch execution loop threads inside separate WebAssembly context wrappers
                await qemu.start();

            } catch (err) {
                statusEl.innerText = "Emulation Runtime Broken";
                statusEl.style.color = "#ff7b72";
                log(`FATAL ERROR: ${err.message}`);
            }
        }

        window.addEventListener("load", launchVGAEngine);
    </script>
</body>
</html>
