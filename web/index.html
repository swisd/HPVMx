<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPVMx Pure x64 Sandbox</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { 
            color: #58a6ff; 
            font-size: 20px; 
            margin-bottom: 5px; 
        }
        .status-panel {
            font-size: 13px;
            color: #8b949e;
            background: #161b22;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #30363d;
            margin-bottom: 15px;
            width: fit-content;
        }
        #terminal_display {
            width: 100%;
            max-width: 700px;
            height: 450px;
            background-color: #010409;
            border: 2px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #7ee787;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1>HPVMx Pure x64 Execution Sandbox</h1>
    <div class="status-panel" id="status">Initializing 64-bit Virtualization Subsystems...</div>
    
    <div id="terminal_display">Preparing execution space container...</div>

    <script type="module">
        // Import the stable immutable client-side x86_64 virtualization library natively
        import * as CheerpX from "https://cxrtnc.leaningtech.com/1.2.8/cx.esm.js";

        const term = document.getElementById("terminal_display");
        const statusEl = document.getElementById("status");

        async function verifyAsset(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                return response.ok;
            } catch (err) {
                return false;
            }
        }

        async function bootPureX64() {
            try {
                statusEl.innerText = "Status: Verifying binary assets...";
                
                const imageExists = await verifyAsset("usb.img");
                if (!imageExists) {
                    throw new Error("Target usb.img data block not located in deployment workspace root.");
                }

                statusEl.innerText = "Status: Spawning x86_64 WebAssembly JIT engine...";
                term.textContent = "Assets verified. Mounting direct HTTP filesystem...\n";

                // Map standard runtime nodes and server contexts directly into virtual device trees
                const webDevice = await CheerpX.WebDevice.create("");
                const dataDevice = await CheerpX.DataDevice.create();

                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "devs", path: "/dev" },
                        { type: "proc", path: "/proc" },
                        { type: "dir", path: "/", dev: webDevice },
                        { type: "dir", path: "/data", dev: dataDevice }
                    ]
                });

                statusEl.innerText = "Status: Processing instruction vectors (Live)";
                statusEl.style.color = "#7ee787";
                term.textContent = "";

                // Directly fire target operations onto the underlying block images, 
                // avoiding slow frame-buffer translation crashes completely.
                await cx.run("/bin/bash", ["-c", "echo '[SYSTEM] x64 Instruction Layer Engaged'; if [ -f '/usb.img' ]; then dd if=/usb.img bs=512 count=8 2>/dev/null; else echo '[WARN] Virtual device file empty'; fi"], {
                    stdout: (str) => {
                        term.textContent += str;
                        term.scrollTop = term.scrollHeight;
                    },
                    stderr: (err) => {
                        term.textContent += `\n[RUNTIME EXCEPTION] ${err}`;
                    }
                });

                statusEl.innerText = "Status: Cycle execution complete.";

            } catch (e) {
                statusEl.innerText = "Execution Pipeline Faulted";
                statusEl.style.color = "#ff7b72";
                term.textContent = `[FATAL EXCEPTION CRASH] Layout configuration broke down:\n${e.message}\n\nStack:\n${e.stack}`;
            }
        }

        window.addEventListener("load", bootPureX64);
    </script>
</body>
</html>
