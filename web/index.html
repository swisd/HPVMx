<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPVMx WebAssembly QEMU x86_64</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #58a6ff; font-size: 18px; margin-bottom: 10px; }
        #canvas_container {
            border: 2px solid #30363d;
            background: #000;
            width: 640px;
            height: 480px;
        }
        #canvas { width: 100%; height: 100%; }
        #log {
            width: 640px;
            height: 150px;
            background: #010409;
            border: 1px solid #30363d;
            margin-top: 10px;
            padding: 8px;
            box-sizing: border-box;
            overflow-y: auto;
            font-size: 11px;
            color: #7ee787;
        }
    </style>
</head>
<body>

    <h1>HPVMx QEMU x86_64 WebAssembly Engine</h1>
    <div id="canvas_container">
        <canvas id="canvas" tabindex="-1"></canvas>
    </div>
    <div id="log">Initializing WebAssembly QEMU filesystem...</div>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) {
            logEl.textContent += '\n' + msg;
            logEl.scrollTop = logEl.scrollHeight;
        }

        // QEMU Emscripten Module Configuration
        var Module = {
            canvas: document.getElementById('canvas'),
            arguments: [
                '-m', '256M',
                '-drive', 'if=pflash,format=raw,readonly=on,file=code.fd',
                '-drive', 'if=pflash,format=raw,file=vars.fd',
                '-drive', 'file=usb.img,format=raw',
                '-net', 'none',
                '-vga', 'std'
            ],
            preRun: [function() {
                log("Mounting virtual files into QEMU MEMFS...");
                
                // Fetch assets synchronously into Emscripten Virtual File System
                function loadFile(filename) {
                    var xhr = new XMLHttpRequest();
                    xhr.open('GET', filename, false);
                    xhr.responseType = 'arraybuffer';
                    xhr.send(null);
                    if (xhr.status === 200) {
                        FS.createDataFile('/', filename, new Uint8Array(xhr.response), true, true, true);
                        log("Loaded asset into MEMFS: " + filename);
                    } else {
                        log("ERROR: Failed to fetch " + filename);
                    }
                }

                loadFile('code.fd');
                loadFile('vars.fd');
                loadFile('usb.img');
            }],
            postRun: [function() {
                log("QEMU x86_64 System Engine successfully initialized.");
            }],
            print: function(text) { log('[QEMU stdout] ' + text); },
            printErr: function(text) { log('[QEMU stderr] ' + text); }
        };
    </script>
    
    <script async src="https://copy.sh/v86/build/qemu-system-x86_64.js"></script>
</body>
</html>
