<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPVMx WASM x86_64 Sandbox</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 18px;
            color: #58a6ff;
            margin-bottom: 12px;
            text-align: center;
        }
        .status-panel {
            font-size: 13px;
            color: #8b949e;
            background: #161b22;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #30363d;
            margin-bottom: 15px;
        }
        #viewport_container {
            border: 3px solid #30363d;
            border-radius: 6px;
            background: #000;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            position: relative;
        }
        #canvas {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }
        .panel-header {
            width: 100%;
            max-width: 640px;
            margin-top: 15px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #8b949e;
        }
        .panel-header button {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 2px 8px;
            font-family: monospace;
            cursor: pointer;
        }
        .panel-header button:hover {
            background: #30363d;
        }
        .console-window {
            width: 100%;
            max-width: 640px;
            height: 180px;
            background-color: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 11px;
            color: #8b949e;
        }
        .log-entry { margin-bottom: 2px; }
        .log-info { color: #58a6ff; }
        .log-warn { color: #d29922; }
        .log-error { color: #f85149; }
        .log-success { color: #7ee787; }
    </style>
</head>
<body>

    <h1>HPVMx Hardware Sandbox (QEMU WASM x86_64)</h1>
    
    <div class="status-panel" id="status">Status: Preparing Engine Context...</div>

    <div id="viewport_container">
        <canvas id="canvas" tabindex="-1" onclick="window.focus()"></canvas>
    </div>

    <div class="panel-header">
        <span>DevTools Console Mirror</span>
        <button onclick="clearConsoleMirror()">Clear Logs</button>
    </div>
    <div id="devtools_mirror" class="console-window"></div>

    <script>
        // --- DEVTOOLS CONSOLE HOOK ---
        const mirrorEl = document.getElementById('devtools_mirror');

        function appendMirrorLog(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toISOString().split('T')[1].slice(0, 8);
            entry.textContent = `[${timestamp}] [${type.toUpperCase()}] ${msg}`;
            mirrorEl.appendChild(entry);
            mirrorEl.scrollTop = mirrorEl.scrollHeight;
        }

        window.clearConsoleMirror = function() {
            mirrorEl.textContent = '';
        };

        // Intercept native browser console channels
        (function() {
            const originalLog = console.log;
            const originalWarn = console.warn;
            const originalError = console.error;

            console.log = function(...args) {
                originalLog.apply(console, args);
                appendMirrorLog(args.join(' '), 'info');
            };

            console.warn = function(...args) {
                originalWarn.apply(console, args);
                appendMirrorLog(args.join(' '), 'warn');
            };

            console.error = function(...args) {
                originalError.apply(console, args);
                appendMirrorLog(args.join(' '), 'error');
            };
        })();

        // --- EMSCRIPTEN QEMU ENGINE CONFIGURATION ---
        const statusEl = document.getElementById("status");

        console.log("ES Module loaded. Initializing Emscripten container context...");

        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", function(e) { 
                    console.error("WebGL Context lost. Reloading canvas..."); 
                    e.preventDefault(); 
                }, false);
                return canvas;
            })(),

            arguments: [
                '-m', '256M',
                '-drive', 'if=pflash,format=raw,readonly=on,file=code.fd',
                '-drive', 'if=pflash,format=raw,file=vars.fd',
                '-drive', 'file=usb.img,format=raw',
                '-vga', 'std',
                '-net', 'none'
            ],

            preRun: [function() {
                statusEl.innerText = "Status: Fetching binary assets into MEMFS...";
                console.log("Mounting virtual pflash and storage devices into WASM memory...");

                function mountAsset(filename) {
                    try {
                        var xhr = new XMLHttpRequest();
                        xhr.open('GET', filename, false); 
                        xhr.responseType = 'arraybuffer';
                        xhr.send(null);
                        console.log(`sent dep req for ${filename}`);

                        if (xhr.status === 200 || xhr.status === 0) {
                            var data = new Uint8Array(xhr.response);
                            FS.createDataFile('/', filename, data, true, true, true);
                            console.log(`Verified asset dependency ${filename}: status=200 (${data.length} bytes)`);
                        } else {
                            console.error(`Failed to fetch dependency ${filename}: status=${xhr.status}`);
                        }
                    } catch (err) {
                        console.error(`Fatal error downloading asset dependency ${filename}: ${err.message}`);
                    }
                }

                mountAsset('code.fd');
                mountAsset('vars.fd');
                mountAsset('usb.img');
            }],

            postRun: [function() {
                statusEl.innerText = "Status: CPU Live. Running UEFI firmware...";
                statusEl.style.color = "#7ee787";
                console.log("QEMU Engine successfully bound and instruction loop engaged.");
            }],

            print: function(text) { 
                console.log(`[QEMU stdout] ${text}`); 
            },
            printErr: function(text) { 
                console.error(`[QEMU stderr] ${text}`); 
            }
        };
    </script>

    <script async src="./qemu-system-x86_64.js"></script>
</body>
</html>
