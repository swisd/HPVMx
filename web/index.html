<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPVMx Mobile Sandbox - Verbose Debug</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #0d1115;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #58a6ff;
            text-align: center;
        }
        #screen_container {
            border: 3px solid #30363d;
            border-radius: 6px;
            background: #000;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
        }
        #screen_container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        .status-panel {
            margin-top: 12px;
            font-size: 13px;
            color: #8b949e;
            background: #161b22;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #30363d;
            margin-bottom: 15px;
        }
        .devtools-container {
            width: 100%;
            max-width: 640px;
            margin-top: 10px;
        }
        .devtools-header {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-bottom: none;
            padding: 6px 12px;
            font-size: 12px;
            color: #8b949e;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            font-family: monospace;
        }
        #devtools_terminal {
            width: 100%;
            height: 300px;
            background-color: #010409;
            border: 1px solid #30363d;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-line { border-bottom: 1px solid #21262d; padding: 3px 0; font-family: monospace; }
        .log-info { color: #c9d1d9; }
        .log-debug { color: #58a6ff; }
        .log-warn { color: #d29922; background: rgba(187, 128, 9, 0.1); }
        .log-error { color: #f85149; background: rgba(248, 81, 73, 0.1); }
        
        #mobile_keyboard_trigger {
            position: absolute;
            left: -9999px;
            opacity: 0;
        }
    </style>
    <script>
        // High-fidelity early interceptor pipeline
        (function() {
            const originalLog = console.log;
            const originalWarn = console.warn;
            const originalError = console.error;
            const logQueue = [];

            window.__appendLogToTerminal = function(args, type) {
                const term = document.getElementById('devtools_terminal');
                const message = Array.from(args).map(arg => {
                    if (arg instanceof Error) return `${arg.name}: ${arg.message}\n${arg.stack}`;
                    if (typeof arg === 'object') {
                        try { return JSON.stringify(arg); } catch(e) { return String(arg); }
                    }
                    return String(arg);
                }).join(' ');

                const timestamp = new Date().toISOString().split('T')[1].slice(0, -1);

                if (term) {
                    const line = document.createElement('div');
                    line.className = `log-line log-${type}`;
                    line.textContent = `[${timestamp}] [${type.toUpperCase()}] ${message}`;
                    term.appendChild(line);
                    term.scrollTop = term.scrollHeight;
                } else {
                    logQueue.push({ args, type, timestamp });
                }
            };

            console.log = function() { originalLog.apply(console, arguments); window.__appendLogToTerminal(arguments, 'info'); };
            console.warn = function() { originalWarn.apply(console, arguments); window.__appendLogToTerminal(arguments, 'warn'); };
            console.error = function() { originalError.apply(console, arguments); window.__appendLogToTerminal(arguments, 'error'); };
            console.debug = function() { window.__appendLogToTerminal(arguments, 'debug'); };
            
            window.addEventListener('error', function(e) {
                window.__appendLogToTerminal([e.message, `at ${e.filename}:${e.lineno}:${e.colno}`], 'error');
            });

            window.addEventListener('unhandledrejection', function(e) {
                window.__appendLogToTerminal([`Unhandled Promise Rejection: ${e.reason}`], 'error');
            });

            window.addEventListener('DOMContentLoaded', () => {
                console.debug("DOM fully loaded and parsed. Emptying log queue...");
                const term = document.getElementById('devtools_terminal');
                while(logQueue.length > 0) {
                    const item = logQueue.shift();
                    const line = document.createElement('div');
                    line.className = `log-line log-${item.type}`;
                    line.textContent = `[${item.timestamp}] [${item.type.toUpperCase()}] ${Array.from(item.args).join(' ')}`;
                    term.appendChild(line);
                }
                term.scrollTop = term.scrollHeight;
            });
        })();
    </script>
</head>
<body>

    <h1>HPVMx Mobile Sandbox</h1>
    
    <div id="screen_container" onclick="focusKeyboard()">
        <canvas style="display: none;"></canvas>
    </div>
    
    <input type="text" id="mobile_keyboard_trigger" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <div class="status-panel" id="status">Trace Phase 1: Script Monitoring Active...</div>

    <div class="devtools-container">
        <div class="devtools-header">Mirrored Browser DevTools Console</div>
        <div id="devtools_terminal"></div>
    </div>

    <script>
        console.debug("Verifying core browser environment features...");
        console.debug("WebAssembly support:", typeof WebAssembly === "object" ? "OK" : "MISSING");
        console.debug("User Agent:", navigator.userAgent);

        // Pre-flight check asset availability via fetch to diagnose cross-origin or network blocks
        async function verifyAsset(url) {
            try {
                console.debug(`Pre-flight probe: fetching metadata for ${url}...`);
                const response = await fetch(url, { method: 'HEAD' });
                console.debug(`Response for ${url}: status=${response.status}, ok=${response.ok}`);
            } catch (err) {
                console.warn(`Pre-flight probe failed for ${url}. This might indicate a CORS or network connectivity blocker.`, err);
            }
        }

        verifyAsset("bios.bin");
        verifyAsset("usb.img");
    </script>

    <script src="https://cdn.jsdelivr.net/npm/v86@0.5.44/build/libv86.js" id="v86-script"></script>
    
    <script>
        const scriptTag = document.getElementById('v86-script');

        // Check for presence immediately, or wait for the load lifecycle event
        if (checkV86Availability()) {
            initEmulator();
        } else {
            scriptTag.addEventListener('load', () => {
                if (checkV86Availability()) {
                    initEmulator();
                } else {
                    console.warn("Primary CDN structure missed global bindings. Attempting emergency UNPKG runtime fallback...");
                    loadFallbackEngine();
                }
            });
        }

        // Namespace discovery tool to find where the constructor is hiding
        function checkV86Availability() {
            if (typeof V86Starter !== 'undefined') {
                window.ResolvedV86Constructor = V86Starter;
                return true;
            }
            if (typeof window.v86 !== 'undefined' && typeof window.v86.V86Starter !== 'undefined') {
                window.ResolvedV86Constructor = window.v86.V86Starter;
                console.log("Namespace discovery found constructor at: window.v86.V86Starter");
                return true;
            }
            if (typeof window.V86 !== 'undefined' && typeof window.V86.V86Starter !== 'undefined') {
                window.ResolvedV86Constructor = window.V86.V86Starter;
                console.log("Namespace discovery found constructor at: window.V86.V86Starter");
                return true;
            }
            return false;
        }

        // If the jsDelivr package script fails to expose a global variable, hot-swap to the standalone browser build
        function loadFallbackEngine() {
            const fallbackScript = document.createElement('script');
            fallbackScript.src = "https://unpkg.com/v86@0.5.44/build/libv86.js";
            fallbackScript.async = true;
            
            fallbackScript.onload = function() {
                console.log("Fallback UNPKG script loaded successfully.");
                if (checkV86Availability()) {
                    initEmulator();
                } else {
                    console.error("CRITICAL: All fallback CDNs exhausted. Engine objects completely unmapped.");
                }
            };
            document.head.appendChild(fallbackScript);
        }

        function focusKeyboard() {
            document.getElementById("mobile_keyboard_trigger").focus();
        }

        function initEmulator() {
            const statusEl = document.getElementById("status");
            statusEl.innerText = "Booting UEFI Runtime...";
            console.log("Instantiating sandbox engine via resolved constructor mapping...");

            try {
                // We call the dynamically mapped constructor token we discovered
                const emulator = new window.ResolvedV86Constructor({
    wasm_path: "https://cdn.jsdelivr.net/npm/v86@0.5.44/build/v86.wasm",
    memory_size: 64 * 1024 * 1024, 
    vga_memory_size: 8 * 1024 * 1024,
    
    // CRITICAL: Force standard PCI VGA card mappings instead of standard raw VGA
    vga_as_pci: true,
    acpi: true, 
    
    // Injects the necessary framework translation mapping layer for graphical output
    vgabios: {
        url: "https://cdn.jsdelivr.net/npm/v86@0.5.44/bios/vgabios.bin"
    },
    
    bios: { url: "bios.bin" },
    hda: { url: "usb.img" },
    boot_order: 0x213,
    screen_container: document.getElementById("screen_container"),
    autostart: true
});

                const inputTrigger = document.getElementById("mobile_keyboard_trigger");
                inputTrigger.addEventListener("input", function(e) {
                    const char = e.target.value.slice(-1);
                    if (char) emulator.serial0_send(char);
                    e.target.value = "";
                });

                inputTrigger.addEventListener("keydown", function(e) {
                    if (e.key === "Enter") emulator.serial0_send("\r\n");
                    else if (e.key === "Backspace") emulator.serial0_send("\b");
                });

                emulator.add_listener("emulator-ready", function() {
                    statusEl.innerText = "Status: Live. Tap display to type.";
                    statusEl.style.color = "#7ee787";
                    console.log("SUCCESS: Simulation thread completely operational.");
                });

            } catch (e) {
                statusEl.innerText = "Initialization Error";
                statusEl.style.color = "#ff7b72";
                console.error("Failed executing structural V86 instance launch loop:", e);
            }
        }
    </script>
</body>
</html>
