name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: download
      run: rustup target add x86_64-unknown-uefi
    - name: Build
      run: cargo build --target x86_64-unknown-uefi --release
    - name: Run tests
      run: cargo test --verbose
