name: Compile Rust UEFI App & Deploy Sandbox

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Storage Formatting Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools mtools

      - name: Set up Rust Nightly Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          targets: x86_64-unknown-uefi

      - name: Compile Rust Application (Nightly)
        run: |
          # Use internal LLVM linker to ensure valid PE/COFF generation on Ubuntu
          export RUSTFLAGS="-C linker-flavor=lld-link -C linker=rust-lld"
          cargo build --release --target x86_64-unknown-uefi

      - name: Assemble Sandbox & Format Bootable USB Image
        run: |
          mkdir dist
          
          # 1. Copy web assets (index.html)
          cp -r web/* dist/
          
          # 2. Fetch QEMU WebAssembly binaries locally to eliminate ORB / CORS blocks
          curl -L -o dist/qemu-system-x86_64.js https://copy.sh/v86/build/qemu-system-x86_64.js || true
          
          # 3. Copy code.fd and vars.fd as standalone pflash files
          cp code.fd dist/code.fd
          cp vars.fd dist/vars.fd
          
          # 4. Create raw 16MB FAT32 USB disk image
          dd if=/dev/zero of=dist/usb.img bs=1M count=16
          mkfs.vfat -F 32 dist/usb.img
          
          # 5. Generate mandatory UEFI hierarchy
          mmd -i dist/usb.img ::/EFI
          mmd -i dist/usb.img ::/EFI/BOOT
          
          # 6. Inject the compiled x86_64 Rust EFI application
          mcopy -i dist/usb.img target/x86_64-unknown-uefi/release/HPVMx.efi ::/EFI/BOOT/BOOTX64.efi
          
          # 7. Force valid CRLF line endings for startup script
          printf "fs0:\EFI\BOOT\BOOTX64.efi\r\n" > startup.nsh
          mcopy -i dist/usb.img startup.nsh ::/startup.nsh
      - name: Setup Pages Gateway
        uses: actions/configure-pages@v5

      - name: Upload Sandbox Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy Live Pages Instance
        id: deployment
        uses: actions/deploy-pages@v4
