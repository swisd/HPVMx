name: Compile Rust UEFI App & Deploy Sandbox

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Storage Formatting Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools mtools

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-uefi

      - name: Compile Rust Application
        run: |
          # Build target in release mode using native cargo cross-compilation
          cargo build --release --target x86_64-unknown-uefi

      - name: Assemble Sandbox & Format Bootable USB Image
        run: |
          mkdir dist
          
          # 1. Bring in index.html architecture from your web folder
          cp -r web/* dist/
          
          # 2. Concat EDK II BIOS components into a single flash image
          cat code.fd vars.fd > dist/bios.bin
          
          # 3. Provision a raw 16MB FAT32 disk volume
          dd if=/dev/zero of=dist/usb.img bs=1M count=16
          mkfs.vfat -F 32 dist/usb.img
          
          # 4. Generate the mandatory hardware UEFI directory hierarchy
          mmd -i dist/usb.img ::/EFI
          mmd -i dist/usb.img ::/EFI/BOOT
          
          # 5. Inject the compiled Rust output binary renamed to standard fallback loader
          # Cargo places the target at: target/x86_64-unknown-uefi/release/[package_name].efi
          mcopy -i dist/usb.img target/x86_64-unknown-uefi/release/hpvmx.efi ::/EFI/BOOT/BOOTX64.efi

      - name: Setup Pages Gateway
        uses: actions/configure-pages@v5

      - name: Upload Sandbox Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy Live Pages Instance
        id: deployment
        uses: actions/deploy-pages@v4
