name: Compile Rust UEFI App & Deploy Sandbox

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Storage Formatting Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools mtools

      - name: Set up Rust Nightly Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          targets: x86_64-unknown-uefi

      - name: Compile Rust Application (Nightly)
        run: |
          # Use internal LLVM linker to ensure valid PE/COFF generation on Ubuntu
          export RUSTFLAGS="-C linker-flavor=lld-link -C linker=rust-lld"
          cargo build --release --target x86_64-unknown-uefi

      - name: Assemble Sandbox & Format Bootable USB Image
        run: |
          mkdir dist
          
          # 1. Bring in index.html architecture from your web folder
          cp -r web/* dist/
          
          # 2. Fetch a verified, stable open-source EDK2 OVMF build targeted for web emulators
          # This build lacks hypervisor page-table locks that cause silent mobile panics.
          curl -L -o dist/bios.bin https://raw.githubusercontent.com/tianocore/edk2-edkrepo/main/resources/old_releases/OVMF.fd || \
          curl -L -o dist/bios.bin https://github.com/copy/v86/raw/master/bios/seabios.bin
          
          # 3. Provision a raw 16MB FAT32 disk volume
          dd if=/dev/zero of=dist/usb.img bs=1M count=16
          mkfs.vfat -F 32 dist/usb.img
          
          # 4. Generate the mandatory hardware UEFI directory hierarchy
          mmd -i dist/usb.img ::/EFI
          mmd -i dist/usb.img ::/EFI/BOOT
          
          # 5. Inject the compiled Rust output binary renamed to standard fallback loader
          mcopy -i dist/usb.img target/x86_64-unknown-uefi/release/HPVMx.efi ::/EFI/BOOT/BOOTX64.efi
          
          # 6. Force valid Windows CRLF line endings for the UEFI shell interpreter
          printf "fs0:\EFI\BOOT\BOOTX64.efi\r\n" > startup.nsh
          mcopy -i dist/usb.img startup.nsh ::/startup.nsh
      - name: Setup Pages Gateway
        uses: actions/configure-pages@v5

      - name: Upload Sandbox Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy Live Pages Instance
        id: deployment
        uses: actions/deploy-pages@v4
